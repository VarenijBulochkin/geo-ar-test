<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <!-- Подключаем стабильную версию A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <!-- 🔧 ИСПРАВЛЕНО: Подключаем стабильный релиз AR.js (3.4.5), а не ветку master -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255,255,255,0.9);
        padding: 10px;
        border-radius: 5px;
        z-index: 999;
        font-family: Arial, sans-serif;
        font-size: 14px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body>
    <div id="info">
      📍 Идём к точке... <br>
      Поворачивайте телефон вокруг себя
    </div>

    <!-- 🔧 ИСПРАВЛЕНО: Упрощённый рендер + videoTexture: true для исправления камеры на мобильных -->
    <a-scene 
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
      
      <!-- Загружаем модель -->
      <a-assets>
        <a-asset-item id="astronaut" src="./assets/astronaut.glb"></a-asset-item>
      </a-assets>

      <!-- Камера с геолокацией -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- Источник света для теней -->
      <a-light type="directional" 
               color="#FFF" 
               intensity="0.8" 
               position="-1 2 1"
               castShadow="true">
      </a-light>

      <!-- Общее освещение -->
      <a-light type="ambient" color="#BBB" intensity="0.5"></a-light>

      <!-- Объект в конкретной точке мира -->
      <a-entity 
          gps-entity-place="latitude: 58.740615; longitude: 27.818822;"
          scale="15 15 15"> <!-- Увеличил до 15, чтобы точно было видно -->
          
          <!-- Круг-платформа под моделью -->
          <a-circle 
              rotation="-90 0 0" 
              radius="2" 
              color="#4CAF50" 
              opacity="0.7"
              position="0 -0.01 0"
              shadow="receive: true">
          </a-circle>

          <!-- Сама модель астронавта -->
          <a-gltf-model 
              src="#astronaut"
              position="0 0 0"
              shadow="cast: true">
          </a-gltf-model>

      </a-entity>

    </a-scene>

    <!-- Скрипт для отображения GPS координат -->
    <script>
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
          (position) => {
            console.log('📍 Ваши координаты:', 
              position.coords.latitude.toFixed(6), 
              position.coords.longitude.toFixed(6));
            console.log('🎯 Точность:', position.coords.accuracy, 'метров');
            
            document.getElementById('info').innerHTML = 
              `📍 Ваши координаты:<br>
               ${position.coords.latitude.toFixed(6)}, ${position.coords.longitude.toFixed(6)}<br>
               Точность: ${Math.round(position.coords.accuracy)} м<br>
               <b>Цель:</b> 58.740615, 27.818822<br>
               Поворачивайте телефон вокруг себя`;
          },
          (error) => {
            console.error('❌ Ошибка GPS:', error);
            document.getElementById('info').innerHTML = 
              '❌ Ошибка GPS. Разрешите доступ к геолокации.';
          },
          { enableHighAccuracy: true }
        );
      }
    </script>
  </body>
</html>
