<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Подключаем A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Подключаем AR.js для геолокации -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255,255,255,0.8);
        padding: 10px;
        border-radius: 5px;
        z-index: 999;
        font-family: Arial;
      }
    </style>
  </head>
  <body>
    <div id="info">
      📍 Идём к точке... <br>
      Поворачивайте телефон вокруг себя
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        geoviewer="loadingScreen: enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Загружаем модель -->
      <a-assets>
        <a-asset-item id="astronaut" src="./assets/astronaut.glb"></a-asset-item>
      </a-assets>

      <!-- Камера с геолокацией -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- Объект в конкретной точке мира -->
      <!-- ⚠️ ЗАМЕНИТЕ координаты на свои! -->
      <a-entity 
          gltf-model="#astronaut"
          gps-entity-place="latitude: 58.7406210938942; longitude: 27.81882290585444;"
          position="0 0 0">
      </a-entity>

    </a-scene>
    <script>
  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
      (position) => {
        console.log('📍 Ваши координаты:', 
          position.coords.latitude.toFixed(6), 
          position.coords.longitude.toFixed(6));
        console.log('🎯 Точность:', position.coords.accuracy, 'метров');
        
        // Обновляем текст на экране
        document.getElementById('info').innerHTML = 
          `📍 Ваши координаты:<br>
           ${position.coords.latitude.toFixed(6)}, ${position.coords.longitude.toFixed(6)}<br>
           Точность: ${Math.round(position.coords.accuracy)} м<br>
           Поворачивайте телефон вокруг себя`;
      },
      (error) => {
        console.error('❌ Ошибка GPS:', error);
        document.getElementById('info').innerHTML = 
          '❌ Ошибка GPS. Разрешите доступ к геолокации.';
      }
    );
  }
</script>
  </body>
</html>
