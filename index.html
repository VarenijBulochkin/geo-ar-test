<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Подключаем A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Подключаем AR.js для геолокации -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255,255,255,0.8);
        padding: 10px;
        border-radius: 5px;
        z-index: 999;
        font-family: Arial;
      }
    </style>
  </head>
  <body>
    <div id="info">
      📍 Идём к точке... <br>
      Поворачивайте телефон вокруг себя
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        geoviewer="loadingScreen: enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Загружаем модель -->
      <a-assets>
        <a-asset-item id="astronaut" src="./assets/astronaut.glb"></a-asset-item>
      </a-assets>

      <!-- Камера с геолокацией -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- Объект в конкретной точке мира -->
      <!-- ⚠️ ЗАМЕНИТЕ координаты на свои! -->
      <a-entity 
          gltf-model="#astronaut"
          gps-entity-place="latitude: 58.74045044185144; longitude: 27.8156889272413;"
          scale="10 10 10"
          position="0 0 0">
      </a-entity>

    </a-scene>
  </body>
</html>
